<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>關務英文學習卡（第二冊）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F2EC;
    --surface: #FDFBF7;
    --border: #D6CFC0;
    --border-light: #EAE5DA;
    --text: #1A1714;
    --text-muted: #6B6459;
    --text-hint: #9E9590;
    --accent: #2D5A3D;
    --accent-light: #E8F2EC;
    --accent-text: #1E3D2A;
    --danger: #8B2A1A;
    --danger-light: #F5EAE7;
    --card-h: clamp(200px, 30vw, 260px);
  }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--text); color: var(--bg); padding: 1.5rem 2rem 1.25rem; display: flex; align-items: flex-end; gap: 1.5rem; flex-wrap: wrap; }
  .header-title { font-family: 'Noto Serif TC', serif; font-size: clamp(1.1rem, 3vw, 1.5rem); font-weight: 700; letter-spacing: 0.05em; line-height: 1; }
  .header-sub { font-size: 0.75rem; opacity: 0.55; letter-spacing: 0.12em; margin-top: 6px; font-weight: 300; }
  .header-badge { margin-left: auto; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 2rem; padding: 4px 14px; font-size: 0.75rem; letter-spacing: 0.06em; font-family: 'DM Mono', monospace; white-space: nowrap; }
  .container { max-width: 680px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border-light); border-radius: 10px; padding: 12px 10px; text-align: center; }
  .stat-num { font-family: 'DM Mono', monospace; font-size: 1.6rem; font-weight: 500; line-height: 1; margin-bottom: 4px; }
  .stat-num.green { color: var(--accent); }
  .stat-num.red   { color: var(--danger); }
  .stat-num.gray  { color: var(--text); }
  .stat-label { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.06em; }
  .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
  .progress-track { flex: 1; height: 4px; background: var(--border-light); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; width: 0%; }
  .progress-label { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
  .mode-tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .mode-tab { padding: 6px 16px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: 'Noto Sans TC', sans-serif; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
  .mode-tab:hover { background: var(--surface); color: var(--text); }
  .mode-tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .card-scene { perspective: 1000px; margin-bottom: 1.25rem; }
  .card-inner { position: relative; width: 100%; height: var(--card-h); transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(.4,0,.2,1); cursor: pointer; }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.75rem; border: 1px solid var(--border); }
  .card-front { background: var(--surface); }
  .card-back { background: var(--accent); transform: rotateY(180deg); border-color: var(--accent); }
  .card-tag { position: absolute; top: 16px; left: 20px; font-size: 0.65rem; letter-spacing: 0.14em; font-weight: 500; text-transform: uppercase; }
  .card-front .card-tag { color: var(--text-hint); }
  .card-back .card-tag { color: rgba(255,255,255,0.5); }
  .card-question { font-family: 'Noto Serif TC', serif; font-size: clamp(0.95rem, 3vw, 1.2rem); font-weight: 600; text-align: center; line-height: 1.6; color: var(--text); }
  .card-answer { font-family: 'DM Mono', monospace; font-size: clamp(0.82rem, 2.5vw, 1rem); font-weight: 500; text-align: center; line-height: 1.6; color: #fff; letter-spacing: 0.02em; }
  .card-hint { position: absolute; bottom: 16px; font-size: 0.7rem; letter-spacing: 0.1em; color: var(--text-hint); }
  .btn-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 1.25rem; }
  .btn { padding: 10px 22px; border-radius: 8px; font-family: 'Noto Sans TC', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); }
  .btn:hover { background: var(--bg); }
  .btn:active { transform: scale(0.97); }
  .btn-know { border-color: var(--accent); color: var(--accent-text); background: var(--accent-light); }
  .btn-know:hover { background: #d4eadc; }
  .btn-dontknow { border-color: #c0604a; color: var(--danger); background: var(--danger-light); }
  .btn-dontknow:hover { background: #eeddd9; }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-primary:hover { background: #333; }
  #done-view { display: none; }
  .done-card { background: var(--surface); border: 1px solid var(--border-light); border-radius: 14px; padding: 2.5rem 2rem; text-align: center; }
  .done-icon { font-size: 3rem; margin-bottom: 1rem; }
  .done-title { font-family: 'Noto Serif TC', serif; font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
  .done-sub { font-size: 0.9rem; color: var(--text-muted); line-height: 1.8; margin-bottom: 1.5rem; }
  .done-pct { font-family: 'DM Mono', monospace; font-size: 3.5rem; font-weight: 500; color: var(--accent); line-height: 1; margin-bottom: 0.25rem; }
  .done-btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  @media (max-width: 480px) { header { padding: 1.25rem 1rem 1rem; } .container { padding: 1.25rem 1rem 3rem; } .btn { padding: 9px 16px; font-size: 0.8rem; } }
</style>
</head>
<body>
<header>
  <div>
    <div class="header-title">關務英文學習卡（第二冊）</div>
    <div class="header-sub">CUSTOMS ENGLISH VOCABULARY — VOL. 2</div>
  </div>
  <div class="header-badge" id="hdr-badge">90 張單字卡</div>
</header>
<div class="container">
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-num green" id="s-know">0</div><div class="stat-label">已掌握</div></div>
    <div class="stat-card"><div class="stat-num red" id="s-unk">0</div><div class="stat-label">待加強</div></div>
    <div class="stat-card"><div class="stat-num gray" id="s-left">90</div><div class="stat-label">未作答</div></div>
  </div>
  <div class="progress-row">
    <div class="progress-track"><div class="progress-fill" id="prog"></div></div>
    <span class="progress-label" id="prog-label">1 / 90</span>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('all')" id="m-all">全部</button>
    <button class="mode-tab" onclick="setMode('unknown')" id="m-unk">待加強 (<span id="unk-n">0</span>)</button>
    <button class="mode-tab" onclick="doShuffle()" id="m-shuf">🔀 隨機</button>
  </div>
  <div id="main-view">
    <div class="card-scene">
      <div class="card-inner" id="card" onclick="flip()" role="button" tabindex="0" aria-label="點擊翻牌">
        <div class="card-face card-front">
          <span class="card-tag">題目</span>
          <div class="card-question" id="q-text"></div>
          <div class="card-hint">點擊翻牌查看答案</div>
        </div>
        <div class="card-face card-back">
          <span class="card-tag">答案</span>
          <div class="card-answer" id="a-text"></div>
        </div>
      </div>
    </div>
    <div class="btn-row" id="ans-btns" style="display:none">
      <button class="btn btn-dontknow" onclick="answer(false)">✕ 還不熟</button>
      <button class="btn btn-know" onclick="answer(true)">✓ 已掌握</button>
    </div>
    <div class="btn-row" id="flip-row">
      <button class="btn btn-primary" onclick="flip()">翻牌看答案</button>
      <button class="btn" onclick="skip()">跳過 →</button>
    </div>
  </div>
  <div id="done-view">
    <div class="done-card">
      <div class="done-icon" id="done-icon">🏆</div>
      <div class="done-pct" id="done-pct">0%</div>
      <div class="done-title" id="done-title">這輪完成！</div>
      <div class="done-sub" id="done-sub"></div>
      <div class="done-btn-row">
        <button class="btn btn-primary" onclick="restart('all')">↺ 重新開始全部</button>
        <button class="btn btn-dontknow" onclick="restart('unk')" id="retry-btn">再練待加強</button>
      </div>
    </div>
  </div>
</div>
<script>

  ["「Reciprocal treatment」在關稅法中代表何種待遇？","互惠待遇"],
  ["快遞貨物類別中，不存在哪種編號（X2, X3, X4, X5）？","X5"],
  ["旅客在旅途中合理需要供個人使用的物品稱為？","Personal effects（個人隨身物品）"],
  ["為防止外來疾病傳入，進口動植物必須接受的程序稱為？","Quarantine（檢疫）"]
];

let deck = [...ALL];
let idx = 0;
let known = new Set();
let unknown = new Set();
let isFlipped = false;

function showCard() {
  if (idx >= deck.length) { showDone(); return; }
  document.getElementById('q-text').textContent = deck[idx][0];
  document.getElementById('a-text').textContent = deck[idx][1];
  document.getElementById('card').classList.remove('flipped');
  isFlipped = false;
  document.getElementById('ans-btns').style.display = 'none';
  document.getElementById('flip-row').style.display = 'flex';
  updateStats();
}

function flip() {
  if (isFlipped) return;
  isFlipped = true;
  document.getElementById('card').classList.add('flipped');
  setTimeout(() => {
    document.getElementById('flip-row').style.display = 'none';
    document.getElementById('ans-btns').style.display = 'flex';
  }, 280);
}

function answer(k) {
  const orig = ALL.indexOf(deck[idx]);
  if (orig >= 0) {
    if (k) { known.add(orig); unknown.delete(orig); }
    else   { unknown.add(orig); known.delete(orig); }
  }
  idx++;
  document.getElementById('unk-n').textContent = unknown.size;
  showCard();
}

function skip() { idx++; showCard(); }

function updateStats() {
  document.getElementById('s-know').textContent = known.size;
  document.getElementById('s-unk').textContent = unknown.size;
  document.getElementById('s-left').textContent = ALL.length - known.size - unknown.size;
  const total = deck.length;
  const pct = total ? Math.round((idx / total) * 100) : 0;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-label').textContent = Math.min(idx + 1, total) + ' / ' + total;
  document.getElementById('hdr-badge').textContent = deck.length + ' 張單字卡';
}

function setMode(m) {
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  if (m === 'all') {
    deck = [...ALL];
    document.getElementById('m-all').classList.add('active');
  } else if (m === 'unknown') {
    const unk = ALL.filter((_, i) => unknown.has(i));
    if (!unk.length) { alert('目前沒有待加強的單字，先完成一輪練習吧！'); return; }
    deck = unk;
    document.getElementById('m-unk').classList.add('active');
  }
  idx = 0; isFlipped = false;
  document.getElementById('main-view').style.display = 'block';
  document.getElementById('done-view').style.display = 'none';
  showCard();
}

function doShuffle() {
  deck = [...ALL].sort(() => Math.random() - 0.5);
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('m-shuf').classList.add('active');
  idx = 0; isFlipped = false;
  document.getElementById('main-view').style.display = 'block';
  document.getElementById('done-view').style.display = 'none';
  showCard();
}

function showDone() {
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('done-view').style.display = 'block';
  const k = known.size;
  const pct = Math.round((k / ALL.length) * 100);
  document.getElementById('done-pct').textContent = pct + '%';
  document.getElementById('done-icon').textContent = pct >= 80 ? '🏆' : pct >= 50 ? '👍' : '💪';
  document.getElementById('done-title').textContent = pct >= 80 ? '表現優秀！' : pct >= 50 ? '繼續努力！' : '加油，再練一次！';
  document.getElementById('done-sub').innerHTML = `已掌握 <strong>${k}</strong> 張・待加強 <strong>${unknown.size}</strong> 張<br>共 ${ALL.length} 張・掌握率`;
  document.getElementById('retry-btn').style.display = unknown.size ? 'flex' : 'none';
}

function restart(t) {
  document.getElementById('main-view').style.display = 'block';
  document.getElementById('done-view').style.display = 'none';
  if (t === 'unk') {
    const unk = ALL.filter((_, i) => unknown.has(i));
    deck = unk.length ? unk : [...ALL];
  } else {
    deck = [...ALL]; known.clear(); unknown.clear();
  }
  idx = 0; isFlipped = false;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('m-all').classList.add('active');
  showCard();
}

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); if (!isFlipped) flip(); }
  if (e.key === 'ArrowRight' && isFlipped) answer(true);
  if (e.key === 'ArrowLeft'  && isFlipped) answer(false);
  if (e.key === 'ArrowDown') skip();
});

showCard();
</script>
</body>
</html>
