<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>關務英文測驗</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F2EC;--surface:#FDFBF7;--border:#D6CFC0;--border-light:#EAE5DA;
  --text:#1A1714;--text-muted:#6B6459;--text-hint:#9E9590;
  --accent:#2D5A3D;--accent-light:#E8F2EC;--accent-text:#1E3D2A;
  --danger:#8B2A1A;--danger-light:#F5EAE7;
  --correct:#1a7a4a;--correct-bg:#e6f5ed;
  --wrong:#c0392b;--wrong-bg:#fdecea;
  --gold:#8B6914;--gold-bg:#FDF6E3;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--text);color:var(--bg);padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.header-title{font-family:'Noto Serif TC',serif;font-size:clamp(1rem,3vw,1.4rem);font-weight:700;letter-spacing:.05em;}
.header-sub{font-size:.72rem;opacity:.5;letter-spacing:.12em;margin-top:4px;}
.hdr-right{display:flex;gap:10px;align-items:center;}
.badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:2rem;padding:4px 14px;font-size:.72rem;font-family:'DM Mono',monospace;white-space:nowrap;}

.container{max-width:700px;margin:0 auto;padding:2rem 1.25rem 4rem;}

/* ── Start screen ── */
#start-screen{text-align:center;padding:2rem 0;}
.start-card{background:var(--surface);border:1px solid var(--border-light);border-radius:16px;padding:2.5rem 2rem;}
.start-icon{font-size:3rem;margin-bottom:1rem;}
.start-title{font-family:'Noto Serif TC',serif;font-size:1.5rem;font-weight:700;margin-bottom:.5rem;}
.start-sub{color:var(--text-muted);font-size:.9rem;line-height:1.8;margin-bottom:1.5rem;}
.setting-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-radius:10px;padding:12px 16px;margin-bottom:10px;}
.setting-label{font-size:.85rem;font-weight:500;}
.setting-select{border:1px solid var(--border);background:var(--surface);border-radius:6px;padding:5px 10px;font-size:.85rem;font-family:'Noto Sans TC',sans-serif;color:var(--text);}

/* ── Quiz ── */
#quiz-screen{display:none;}
.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap;}
.q-counter{font-family:'DM Mono',monospace;font-size:.8rem;color:var(--text-muted);white-space:nowrap;}
.progress-track{flex:1;height:5px;background:var(--border-light);border-radius:99px;overflow:hidden;min-width:80px;}
.progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s;}
.score-badge{font-family:'DM Mono',monospace;font-size:.8rem;background:var(--accent-light);color:var(--accent-text);border-radius:2rem;padding:4px 12px;white-space:nowrap;}
.timer-badge{font-family:'DM Mono',monospace;font-size:.8rem;border-radius:2rem;padding:4px 12px;white-space:nowrap;background:var(--bg);border:1px solid var(--border);}
.timer-badge.warning{background:#fff3cd;border-color:#f0ad4e;color:#856404;}
.timer-badge.danger{background:var(--danger-light);border-color:#e0917f;color:var(--danger);}

.q-card{background:var(--surface);border:1px solid var(--border-light);border-radius:14px;padding:1.75rem;margin-bottom:1.25rem;}
.q-num{font-size:.7rem;letter-spacing:.14em;color:var(--text-hint);margin-bottom:.6rem;text-transform:uppercase;}
.q-text{font-family:'Noto Serif TC',serif;font-size:clamp(1rem,3vw,1.15rem);font-weight:600;line-height:1.7;}

.options{display:flex;flex-direction:column;gap:10px;}
.opt{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:10px;border:1.5px solid var(--border-light);background:var(--surface);cursor:pointer;transition:all .15s;text-align:left;font-family:'Noto Sans TC',sans-serif;font-size:.9rem;line-height:1.5;color:var(--text);}
.opt:hover:not(.answered){border-color:var(--accent);background:var(--accent-light);}
.opt-label{font-family:'DM Mono',monospace;font-size:.8rem;font-weight:500;color:var(--text-hint);min-width:20px;padding-top:1px;}
.opt.correct{border-color:var(--correct);background:var(--correct-bg);color:var(--correct);}
.opt.correct .opt-label{color:var(--correct);}
.opt.wrong{border-color:var(--wrong);background:var(--wrong-bg);color:var(--wrong);}
.opt.wrong .opt-label{color:var(--wrong);}
.opt.show-correct{border-color:var(--correct);background:var(--correct-bg);}

.feedback{padding:12px 16px;border-radius:10px;font-size:.88rem;line-height:1.6;margin-bottom:1rem;display:none;}
.feedback.correct{background:var(--correct-bg);color:var(--correct);border:1px solid #a8d5b8;}
.feedback.wrong{background:var(--wrong-bg);color:var(--wrong);border:1px solid #f5b7b1;}

.next-btn{width:100%;padding:12px;border-radius:10px;background:var(--text);color:var(--bg);border:none;font-family:'Noto Sans TC',sans-serif;font-size:.95rem;font-weight:500;cursor:pointer;transition:background .15s;display:none;}
.next-btn:hover{background:#333;}

/* ── Result ── */
#result-screen{display:none;}
.result-card{background:var(--surface);border:1px solid var(--border-light);border-radius:16px;padding:2.5rem 2rem;text-align:center;}
.result-icon{font-size:3.5rem;margin-bottom:.75rem;}
.result-pct{font-family:'DM Mono',monospace;font-size:4rem;font-weight:500;line-height:1;color:var(--accent);margin-bottom:.25rem;}
.result-title{font-family:'Noto Serif TC',serif;font-size:1.4rem;font-weight:700;margin-bottom:.5rem;}
.result-sub{color:var(--text-muted);font-size:.88rem;line-height:1.8;margin-bottom:1.5rem;}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
.rstat{background:var(--bg);border-radius:10px;padding:12px 8px;text-align:center;}
.rstat-num{font-family:'DM Mono',monospace;font-size:1.6rem;font-weight:500;}
.rstat-num.g{color:var(--correct);}
.rstat-num.r{color:var(--wrong);}
.rstat-num.b{color:var(--accent);}
.rstat-label{font-size:.7rem;color:var(--text-muted);margin-top:3px;}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn{padding:10px 22px;border-radius:8px;font-family:'Noto Sans TC',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--surface);color:var(--text);}
.btn:hover{background:var(--bg);}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text);}
.btn-primary:hover{background:#333;}

/* review list */
.review-section{margin-top:1.5rem;text-align:left;}
.review-title{font-size:.8rem;letter-spacing:.1em;color:var(--text-muted);margin-bottom:.75rem;text-transform:uppercase;}
.review-item{background:var(--bg);border-radius:8px;padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--border);}
.review-item.wrong{border-left-color:var(--wrong);}
.review-item.correct{border-left-color:var(--correct);}
.review-q{font-size:.82rem;color:var(--text-muted);margin-bottom:4px;}
.review-a{font-size:.85rem;font-weight:500;}

@media(max-width:480px){
  header{padding:1rem;}
  .container{padding:1.25rem 1rem 3rem;}
  .opt{font-size:.84rem;padding:12px 14px;}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">關務英文測驗</div>
    <div class="header-sub">CUSTOMS ENGLISH QUIZ</div>
  </div>
  <div class="hdr-right">
    <span class="badge">165 題題庫</span>
  </div>
</header>

<div class="container">

<!-- Start -->
<div id="start-screen">
  <div class="start-card">
    <div class="start-icon">📋</div>
    <div class="start-title">關務英文選擇題測驗</div>
    <div class="start-sub">從 165 題題庫隨機出題・4 選 1・即時計分<br>完成後顯示成績單與錯題複習</div>
    <div class="setting-row">
      <span class="setting-label">📝 出題數量</span>
      <select class="setting-select" id="q-count">
        <option value="10">10 題（快速練習）</option>
        <option value="20" selected>20 題（標準測驗）</option>
        <option value="30">30 題（進階測驗）</option>
        <option value="50">50 題（完整測驗）</option>
      </select>
    </div>
    <div class="setting-row">
      <span class="setting-label">⏱ 每題限時</span>
      <select class="setting-select" id="time-limit">
        <option value="0">不限時</option>
        <option value="15">15 秒</option>
        <option value="20" selected>20 秒</option>
        <option value="30">30 秒</option>
      </select>
    </div>
    <div class="setting-row">
      <span class="setting-label">📚 出題範圍</span>
      <select class="setting-select" id="deck-range">
        <option value="all" selected>兩冊合併（165 題）</option>
        <option value="vol1">第一冊（75 題）</option>
        <option value="vol2">第二冊（90 題）</option>
      </select>
    </div>
    <br>
    <button class="btn btn-primary" onclick="startQuiz()" style="width:100%;padding:13px;font-size:1rem;">開始測驗 →</button>
  </div>
</div>

<!-- Quiz -->
<div id="quiz-screen">
  <div class="top-bar">
    <span class="q-counter" id="q-counter">1 / 20</span>
    <div class="progress-track"><div class="progress-fill" id="q-prog" style="width:0%"></div></div>
    <span class="score-badge" id="score-badge">得分 0</span>
    <span class="timer-badge" id="timer-badge" style="display:none">⏱ 20s</span>
  </div>
  <div class="q-card">
    <div class="q-num" id="q-num">題目 1</div>
    <div class="q-text" id="q-text"></div>
  </div>
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題 →</button>
</div>

<!-- Result -->
<div id="result-screen">
  <div class="result-card">
    <div class="result-icon" id="r-icon">🏆</div>
    <div class="result-pct" id="r-pct">0%</div>
    <div class="result-title" id="r-title">測驗完成！</div>
    <div class="result-sub" id="r-sub"></div>
    <div class="result-stats">
      <div class="rstat"><div class="rstat-num g" id="r-correct">0</div><div class="rstat-label">答對</div></div>
      <div class="rstat"><div class="rstat-num r" id="r-wrong">0</div><div class="rstat-label">答錯</div></div>
      <div class="rstat"><div class="rstat-num b" id="r-score">0</div><div class="rstat-label">總分</div></div>
    </div>
    <div class="result-btns">
      <button class="btn btn-primary" onclick="restartQuiz()">↺ 再測一次</button>
      <button class="btn" onclick="showReview()" id="review-btn">📋 查看錯題</button>
      <button class="btn" onclick="goHome()">⚙ 重新設定</button>
    </div>
    <div class="review-section" id="review-section" style="display:none">
      <div class="review-title">❌ 答錯的題目</div>
      <div id="review-list"></div>
    </div>
  </div>
</div>

</div>

let allCards = [];
let quizDeck = [];
let currentQ = 0;
let score = 0;
let correctCount = 0;
let wrongCount = 0;
let timeLimit = 20;
let timer = null;
let timeLeft = 0;
let answered = false;
let wrongItems = [];
let totalQ = 20;

function buildDeck(range) {
  if (range === 'vol1') return [...VOL1];
  if (range === 'vol2') return [...VOL2];
  return [...VOL1, ...VOL2];
}

function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

function startQuiz() {
  totalQ = parseInt(document.getElementById('q-count').value);
  timeLimit = parseInt(document.getElementById('time-limit').value);
  const range = document.getElementById('deck-range').value;
  allCards = shuffle(buildDeck(range));
  quizDeck = allCards.slice(0, Math.min(totalQ, allCards.length));
  currentQ = 0; score = 0; correctCount = 0; wrongCount = 0; wrongItems = [];
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('result-screen').style.display = 'none';
  if (timeLimit > 0) document.getElementById('timer-badge').style.display = 'inline-block';
  else document.getElementById('timer-badge').style.display = 'none';
  showQuestion();
}

function showQuestion() {
  if (currentQ >= quizDeck.length) { showResult(); return; }
  answered = false;
  const q = quizDeck[currentQ];
  document.getElementById('q-num').textContent = '題目 ' + (currentQ + 1);
  document.getElementById('q-text').textContent = q[0];
  document.getElementById('q-counter').textContent = (currentQ + 1) + ' / ' + quizDeck.length;
  document.getElementById('q-prog').style.width = Math.round((currentQ / quizDeck.length) * 100) + '%';
  document.getElementById('score-badge').textContent = '得分 ' + score;
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';

  // Build options: index 1=correct, 2-4=wrong
  const opts = [
    {text: q[1], correct: true},
    {text: q[2], correct: false},
    {text: q[3], correct: false},
    {text: q[4], correct: false},
  ];
  shuffle(opts);

  const labels = ['A', 'B', 'C', 'D'];
  const container = document.getElementById('options');
  container.innerHTML = '';
  opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-label">${labels[i]}</span><span>${opt.text}</span>`;
    btn.dataset.correct = opt.correct;
    btn.onclick = () => selectAnswer(btn, opt.correct, q[1]);
    container.appendChild(btn);
  });

  if (timeLimit > 0) startTimer();
}

function startTimer() {
  clearInterval(timer);
  timeLeft = timeLimit;
  updateTimerBadge();
  timer = setInterval(() => {
    timeLeft--;
    updateTimerBadge();
    if (timeLeft <= 0) {
      clearInterval(timer);
      if (!answered) timeUp();
    }
  }, 1000);
}

function updateTimerBadge() {
  const el = document.getElementById('timer-badge');
  el.textContent = '⏱ ' + timeLeft + 's';
  el.className = 'timer-badge' + (timeLeft <= 5 ? ' danger' : timeLeft <= 10 ? ' warning' : '');
}

function timeUp() {
  answered = true;
  const correct = quizDeck[currentQ][1];
  document.querySelectorAll('.opt').forEach(btn => {
    if (btn.dataset.correct === 'true') btn.classList.add('show-correct');
    btn.onclick = null;
  });
  wrongCount++;
  wrongItems.push({q: quizDeck[currentQ][0], a: correct, yours: '（超時未答）', correct: false});
  showFeedback(false, correct, '（超時）');
  document.getElementById('next-btn').style.display = 'block';
}

function selectAnswer(btn, isCorrect, correctAns) {
  if (answered) return;
  answered = true;
  clearInterval(timer);
  document.querySelectorAll('.opt').forEach(b => { b.onclick = null; });
  if (isCorrect) {
    btn.classList.add('correct');
    score += timeLimit > 0 ? Math.max(1, timeLeft) * 5 : 10;
    correctCount++;
    showFeedback(true, correctAns, btn.querySelector('span:last-child').textContent);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt').forEach(b => {
      if (b.dataset.correct === 'true') b.classList.add('show-correct');
    });
    wrongCount++;
    wrongItems.push({q: quizDeck[currentQ][0], a: correctAns, yours: btn.querySelector('span:last-child').textContent, correct: false});
    showFeedback(false, correctAns, btn.querySelector('span:last-child').textContent);
  }
  document.getElementById('next-btn').style.display = 'block';
  document.getElementById('score-badge').textContent = '得分 ' + score;
}

function showFeedback(isCorrect, correct, yours) {
  const el = document.getElementById('feedback');
  if (isCorrect) {
    el.className = 'feedback correct';
    el.textContent = '✓ 答對了！正確答案：' + correct;
  } else {
    el.className = 'feedback wrong';
    el.textContent = '✕ 答錯了！正確答案：' + correct;
  }
  el.style.display = 'block';
}

function nextQuestion() {
  currentQ++;
  showQuestion();
}

function showResult() {
  clearInterval(timer);
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  const pct = Math.round((correctCount / quizDeck.length) * 100);
  document.getElementById('r-pct').textContent = pct + '%';
  document.getElementById('r-icon').textContent = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '💪';
  document.getElementById('r-title').textContent = pct >= 80 ? '優秀！' : pct >= 60 ? '不錯！' : '繼續加油！';
  document.getElementById('r-sub').innerHTML = `答對 ${correctCount} 題・答錯 ${wrongCount} 題・共 ${quizDeck.length} 題`;
  document.getElementById('r-correct').textContent = correctCount;
  document.getElementById('r-wrong').textContent = wrongCount;
  document.getElementById('r-score').textContent = score;
  document.getElementById('review-btn').style.display = wrongItems.length ? 'inline-flex' : 'none';
  document.getElementById('review-section').style.display = 'none';
  document.getElementById('q-prog').style.width = '100%';
}

function showReview() {
  const sec = document.getElementById('review-section');
  if (sec.style.display === 'block') { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  const list = document.getElementById('review-list');
  list.innerHTML = '';
  wrongItems.forEach(item => {
    const div = document.createElement('div');
    div.className = 'review-item wrong';
    div.innerHTML = `<div class="review-q">${item.q}</div><div class="review-a">✓ ${item.a}</div>`;
    list.appendChild(div);
  });
}

function restartQuiz() {
  document.getElementById('result-screen').style.display = 'none';
  quizDeck = shuffle([...allCards]).slice(0, totalQ);
  currentQ = 0; score = 0; correctCount = 0; wrongCount = 0; wrongItems = [];
  document.getElementById('quiz-screen').style.display = 'block';
  if (timeLimit > 0) document.getElementById('timer-badge').style.display = 'inline-block';
  showQuestion();
}

function goHome() {
  clearInterval(timer);
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
}
</script>
